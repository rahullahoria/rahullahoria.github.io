<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <title></title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script
      type="text/javascript"
      src="http://code.jquery.com/jquery-1.6.js"
    ></script>

    <style id="compiled-css" type="text/css">
      body,
      html {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
      }
      #chatroom {
        background-color: BurlyWood;
        float: right;
        position: absolute;
        height: 100%;
        right: 0;
        left: 75%;
       
      }
      #video {
        /* background-color: IndianRed; */

       
        width: 75%;
        float: left;
        position: absolute;
        height: 100%;
        overflow-y: hidden;
      }

      #dragbar {
        background-color: black;
        height: 100%;
        float: right;
        width: 3px;
        cursor: col-resize;
      }
      #ghostbar {
        width: 3px;
        background-color: #000;
        opacity: 0.5;
        position: absolute;
        cursor: col-resize;
        z-index: 999;
      }
      /* EOS */
    </style>
  </head>
  <body>
      
    <div id="video">
      <span id="position"></span>
      <div id="dragbar"></div>


 <iframe frameborder="0"
 style="height: 100%; width: 99%;" src="http://speed.mogiio.com/embed3/60053ba50ac1a21f922760a1" 
   allow="accelerometer; autoplay; encrypted-media;gyroscope; picture-in-picture" 
   allowfullscreen >
 </iframe>
         
    </div>
    <div id="chatroom">chatroom</div>

    <script type="text/javascript">
      //<![CDATA[

      var i = 0;
      var dragging = false;
      $("#dragbar").mousedown(function (e) {
        e.preventDefault();

        dragging = true;
        var chatroom = $("#chatroom");
        var ghostbar = $("<div>", {
          id: "ghostbar",
          css: {
            height: chatroom.outerHeight(),
            top: chatroom.offset().top,
            left: chatroom.offset().left,
          },
        }).appendTo("body");

        $(document).mousemove(function (e) {
          ghostbar.css("left", e.pageX + 2);
        });
      });

      $(document).mouseup(function (e) {
        if (dragging) {
          $("#video").css("width", e.pageX + 2);
          $("#chatroom").css("left", e.pageX + 2);
          $("#ghostbar").remove();
          $(document).unbind("mousemove");
          dragging = false;
        }
      });

      //]]>
    </script>
  </body>
</html>
