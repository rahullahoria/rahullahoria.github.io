<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/style.css" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Chat | ChatApp</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>
    <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
  </head>
  <body>
 
    <div id="timer" class="backgr">
      <div class="timer_str">
        Webinar will start in<br />
        <span class="timer" id="time">05:00</span>
      </div>
    </div>

    <div id="webinar-over" class="backgr">
      <div class="timer_str">
        Webinar is Over<br />
        <span class="timer" id="time">Register for Next Webinar</span>

        <div id="upcoming-webinars">
          
        </div>
        
      </div>
    </div>

    <div id="webinar" class="webinar_box">
      <video
        width="100%"
       
        id="video"
        controls
      ></video>

      <div id="action-box" class="fixed_div">
        
        <a class="btn notification" href="#" onclick="showChatBox()">
          <span class="iconify icon_btn" data-icon="carbon:chat-bot" data-inline="false">
            
          </span>
          <span class="icon_text">
            chat
          </span>
          <span id="message-count" class="badge">3</span>
        </a>
<!-- 
        <a class="btn" href="#">
          <span class="iconify icon_btn" data-icon="cib:about-me" data-inline="false"></span>          <span class="icon_text">
            about
          </span>
        </a> -->
      </div>

      <!-- <div class="container">
        <div class="header" id="about_webinar_container">
          <span>About Webinar</span>
        </div>
        <div class="content">
          <div id="about_webinar" style="margin: 20px"></div>
        </div>
      </div> -->

      <div id="pool-box-center" class="pool_box">
        <div id="pool-results" style="margin-left: 10px">
        </div>

        <div id="pool" style="margin-left: 10px"></div>
      </div>

      <div id="chat-box" class="chat_box">
        <div >Click here to minimize</div>
        <ol id="messages" class="chat__messages"></ol>

        

        <div class="chat__footer">
          <form id="message-form">
            <input
              type="text"
              name="message"
              placeholder="Message"
              autofocus
              autocomplete="off"
            />
            <button>Send</button>
          </form>
          <button onclick="hideChatBox()">Close</button>

          <!-- <button id="send-location">Send location</button> -->
        </div>
      </div>

    </div>

    <script id="upcoming-webinar-template" type="text/template">
      <div style="margin: 10px">
        {{startTime}} <button onclick="regForNextWebinar('{{wId}}')" >Book Now</button>
      </div>
  </script>
    <script id="pool-results-template" type="text/template">

      <canvas id="bar-chart" style="color: white" width="800" height="450"></canvas>
    
    </script>


    <script id="pool-template" type="text/template">
    
      <div style="text-align: left">
            <br />
            <h3>{{ question }}</h3>
            <br />
            
              <button onclick="sendPool('{{ op1 }}');">{{ op1 }}</button><br /><br />
              <button onclick="sendPool('{{ op2 }}');">{{ op2 }}</button><br /><br />
              <button onclick="sendPool('{{ op3 }}');">{{ op3 }}</button><br /><br />
            </div>
            
           
    </script>

    <script id="message-template" type="text/template">
      <li class="message">
          <div class="message__title">
              <h4>{{ from }}</h4>
              <span>{{ createAt }}</span>
          </div>
          <div class="message__body">
              <p>{{ text }}</p>
          </div>
      </li>
    </script>

    <script id="about-webinar-template" type="text/template">
      <div style="width:65%; float: left;">
        <h3 >
          {{ title }}
        </h3>
      </div>
      <div style="width:35%;  float: right;font-style: italic;">
        <h3 style="text-align:right;">
           by {{ speaker }}
        </h3>
      </div>

      <p style="color: white;">

        {{ des }}

      </p>
    </script>

    <script id="location-message-template" type="text/template">
      <li class="message">
          <div class="message__title">
              <h4>{{ from }}</h4>
              <span>{{ createAt }}</span>
          </div>
          <div class="message__body">
              <a href="{{ url }}" target="_blank">My current location</a>
          </div>
      </li>
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/libs/jquery-3.2.1.min.js"></script>
    <script src="/js/libs/moment.js"></script>
    <script src="/js/libs/mustache.js"></script>
    <script src="/js/libs/deparam.js"></script>
    <script src="/js/chat.js"></script>
  </body>
</html>
